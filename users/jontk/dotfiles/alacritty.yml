# Alacritty configuration for macOS
# This file is managed by Home Manager

window:
  dimensions:
    columns: 120
    lines: 40
  padding:
    x: 5
    y: 5
  decorations: buttonless
  opacity: 0.95
  dynamic_title: true

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: "FiraCode Nerd Font"
    style: Regular
  bold:
    family: "FiraCode Nerd Font"
    style: Bold
  italic:
    family: "FiraCode Nerd Font"
    style: Italic
  bold_italic:
    family: "FiraCode Nerd Font"
    style: Bold Italic
  size: 14.0
  offset:
    x: 0
    y: 1

colors:
  primary:
    background: '#282a36'
    foreground: '#f8f8f2'
    bright_foreground: '#ffffff'
  cursor:
    text: CellBackground
    cursor: CellForeground
  selection:
    text: CellForeground
    background: '#44475a'
  normal:
    black:   '#000000'
    red:     '#ff5555'
    green:   '#50fa7b'
    yellow:  '#f1fa8c'
    blue:    '#bd93f9'
    magenta: '#ff79c6'
    cyan:    '#8be9fd'
    white:   '#bfbfbf'
  bright:
    black:   '#4d4d4d'
    red:     '#ff6e67'
    green:   '#5af78e'
    yellow:  '#f4f99d'
    blue:    '#caa9fa'
    magenta: '#ff92d0'
    cyan:    '#9aedfe'
    white:   '#e6e6e6'

bell:
  animation: EaseOutExpo
  duration: 0
  color: '#ffffff'

cursor:
  style:
    shape: Block
    blinking: Off
  vi_mode_style: None
  unfocused_hollow: true
  thickness: 0.15

mouse:
  hide_when_typing: true

selection:
  save_to_clipboard: true

key_bindings:
  - { key: V,        mods: Command,       action: Paste }
  - { key: C,        mods: Command,       action: Copy }
  - { key: Q,        mods: Command,       action: Quit }
  - { key: N,        mods: Command,       action: SpawnNewInstance }
  - { key: Return,   mods: Command,       action: ToggleFullscreen }
  - { key: Plus,     mods: Command,       action: IncreaseFontSize }
  - { key: Minus,    mods: Command,       action: DecreaseFontSize }
  - { key: Key0,     mods: Command,       action: ResetFontSize }